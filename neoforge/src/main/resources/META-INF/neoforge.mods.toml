modLoader="kotlinforforge"
loaderVersion="[6.0,)"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="KB"
credits="Historical GPLv3 Middle-earth source is attributed in NOTICE.md; all current gameplay and authored assets follow project provenance rules."
description='''
First-hand Clone Wars battle, recruitment, settlement, logistics, vehicle,
planet, conquest, and Force gameplay for Minecraft ${minecraft_version}.
'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neoforge_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="[${minecraft_version}]"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="architectury"
type="required"
versionRange="[${architectury_api_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="geckolib"
type="required"
versionRange="[${geckolib_version},)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="smartbrainlib"
type="required"
versionRange="[${smartbrainlib_version},3.0.0)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="yet_another_config_lib_v3"
type="required"
versionRange="[${yacl_version},)"
ordering="AFTER"
side="CLIENT"
